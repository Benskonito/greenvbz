name: Render Redsky

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.discover.outputs.matrix }}
      has_work: ${{ steps.discover.outputs.has_work }}
    steps:
      - name: Install deps
        run: pip install gdown --break-system-packages

      - name: Discover all images in Drive
        id: discover
        run: |
          python -c "
          import json, os, sys
          from pathlib import Path
          import gdown

          REDSKYIMG_FOLDER = '1BvFlR82cNTxZYuzSuGqPaWgYMMJH4gr2'
          TMP_DIR = Path('/tmp/discover_redsky')
          TMP_DIR.mkdir(parents=True, exist_ok=True)

          print('Downloading image folder to discover available images...')
          try:
              gdown.download_folder(id=REDSKYIMG_FOLDER, output=str(TMP_DIR), quiet=False)
          except Exception as e:
              print(f'ERROR: failed to download image folder: {e}', file=sys.stderr)
              sys.exit(1)

          all_images = sorted(
              p for p in TMP_DIR.rglob('*')
              if p.suffix.lower() in ('.png', '.jpg', '.jpeg')
          )

          if not all_images:
              print('ERROR: no images found in Drive folder after download.', file=sys.stderr)
              sys.exit(1)

          print(f'Total images in Drive: {len(all_images)}')
          for p in all_images:
              print(f'  - {p.name}')

          matrix = {'include': [{'image_name': p.name} for p in all_images]}
          has_work = 'true' if all_images else 'false'

          github_output = os.environ.get('GITHUB_OUTPUT')
          with open(github_output, 'a') as f:
              f.write(f'matrix={json.dumps(matrix)}\n')
              f.write(f'has_work={has_work}\n')
          "

  render:
    needs: discover
    if: needs.discover.outputs.has_work == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      max-parallel: 1
      fail-fast: false
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg --fix-missing
          pip install gdown --break-system-packages

      - name: Run render
        id: render
        env:
          TARGET_IMAGE_NAME: ${{ matrix.image_name }}
        run: python render.py

      - name: Determine REDSKY number
        id: redsky
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LAST_NUM=$(gh release list --repo "${{ github.repository }}" --limit 1000 --json tagName \
            -q '.[].tagName' 2>/dev/null \
            | grep -oE '^REDSKY-[0-9]+$' \
            | grep -oE '[0-9]+' \
            | sort -n \
            | tail -1)

          if [ -z "$LAST_NUM" ]; then
            NEXT_NUM=1
          else
            NEXT_NUM=$((LAST_NUM + 1))
          fi

          echo "num=$NEXT_NUM" >> "$GITHUB_OUTPUT"
          echo "name=REDSKY-$NEXT_NUM" >> "$GITHUB_OUTPUT"
          echo ">>> This release will be: REDSKY-$NEXT_NUM"

      - name: Rename output file with REDSKY branding
        id: rename
        run: |
          SRC="${{ steps.render.outputs.output_path }}"
          DIR=$(dirname "$SRC")
          DEST="$DIR/${{ steps.redsky.outputs.name }}.mp4"
          mv "$SRC" "$DEST"
          echo "final_path=$DEST" >> "$GITHUB_OUTPUT"
          echo ">>> Renamed $SRC -> $DEST"

      - name: Show summary
        if: always()
        run: |
          FOLDER_ID="1BvFlR82cNTxZYuzSuGqPaWgYMMJH4gr2"
          STEM=$(echo "${{ matrix.image_name }}" | sed 's/\.[^.]*$//')
          ID_FILE="/tmp/redsky/image_id_${STEM}.txt"

          echo "## 🖼️ ${{ steps.redsky.outputs.name }} — ${{ matrix.image_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Source filename:** \`${{ matrix.image_name }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Release file:** \`${{ steps.redsky.outputs.name }}.mp4\`" >> $GITHUB_STEP_SUMMARY
          echo "**Final size:** \`${{ steps.render.outputs.final_size_mb }} MB\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "$ID_FILE" ]; then
            FILE_ID=$(cat "$ID_FILE")
            echo "![image preview](https://drive.google.com/uc?id=${FILE_ID}&export=view)" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
          fi

          echo "> Delete **\`${{ matrix.image_name }}\`** from your [Google Drive folder](https://drive.google.com/drive/folders/${FOLDER_ID}) after downloading." >> $GITHUB_STEP_SUMMARY

      - name: Create GitHub Release with video
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.redsky.outputs.name }}
          name: "${{ steps.redsky.outputs.name }} (${{ steps.render.outputs.final_size_mb }} MB)"
          body: |
            somewhere

            **Release:** ${{ steps.redsky.outputs.name }}
            **Source image:** ${{ matrix.image_name }}
            **Final size:** ${{ steps.render.outputs.final_size_mb }} MB
            **Duration:** ${{ steps.render.outputs.duration_seconds }} seconds
            **Generated by workflow run:** ${{ github.run_id }}
          files: ${{ steps.rename.outputs.final_path }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
